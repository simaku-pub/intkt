<!DOCTYPE html>

<head>
  <meta charset="utf-8">
  <script>
    var l = window.location;
    sessionStorage.redirect = l.pathname.slice('/intkt'.length) + l.search + l.hash;
    l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/intkt/');
  </script>
</head>

</html>
